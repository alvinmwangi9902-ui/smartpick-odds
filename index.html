<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPick AI | 1.5 - 2.0 Target Predictions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <header class="border-b border-gray-800 p-4 sticky top-0 bg-gray-900 bg-opacity-95 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-green-400">SMARTPICK <span class="text-white text-xs px-2 py-0.5 bg-green-600 rounded-full">AI</span></h1>
            <span class="text-xs text-gray-400">Target Odds: 1.50 - 2.00</span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6 pb-24">
        
        <div class="bg-gradient-to-br from-gray-800 to-gray-850 p-4 rounded-xl border border-gray-700 shadow-lg">
            <h2 class="text-sm font-semibold uppercase text-gray-400 tracking-wide mb-1">Daily System Strategy</h2>
            <p class="text-xs text-gray-300 leading-relaxed">
                Our model filters matches with a strict mathematical probability threshold of <span class="text-green-400 font-bold">65%+</span> to generate steady compounding slips.
            </p>
        </div>

        <div class="space-y-4">
            <h3 class="text-md font-bold text-gray-200 pl-1 flex items-center gap-2">
                <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span> Verified Slips For Today
            </h3>
            
            <div id="predictions-container" class="space-y-3">
                </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-gray-950 border-t border-gray-800 p-3">
        <div class="max-w-md mx-auto flex justify-around text-center text-xs">
            <a href="#" class="text-green-400 font-medium">🎯 Today's Slips</a>
            <a href="#" class="text-gray-500 hover:text-gray-300">📈 Tracker</a>
        </div>
    </nav>

    <script>
        // Paste the output array from your python AI script here 
        const todayPredictions = [
            {
                league: "ENGLISH PREMIER LEAGUE",
                match: "Arsenal vs Chelsea",
                market: "Home Win or Draw (1X)",
                odds: "1.55",
                probability: "72.4%",
                status: "Active"
            },
            {
                league: "CAF CHAMPIONS LEAGUE",
                match: "Gor Mahia vs Al Ahly",
                market: "Under 2.5 Goals",
                odds: "1.78",
                probability: "66.1%",
                status: "Active"
            }
        ];

        const container = document.getElementById('predictions-container');

        todayPredictions.forEach(pred => {
            const card = `
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-750 hover:border-gray-700 transition">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-bold text-gray-400 tracking-wider uppercase">${pred.league}</span>
                        <span class="text-[10px] px-2 py-0.5 bg-gray-700 text-green-400 rounded-md font-mono">${pred.probability} Conf.</span>
                    </div>
                    <h4 class="text-sm font-bold text-white mb-3">${pred.match}</h4>
                    <div class="flex justify-between items-center pt-2 border-t border-gray-700/50">
                        <div>
                            <span class="text-xs text-gray-400 block">Pick</span>
                            <span class="text-xs font-semibold text-gray-200">${pred.market}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-xs text-gray-400 block">Odds</span>
                            <span class="text-sm font-bold text-green-400 font-mono">${pred.odds}</span>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });
    </script>
</body>
</html>
